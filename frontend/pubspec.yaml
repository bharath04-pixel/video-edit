name: ai_video_editor
description: AI-powered video editing mobile application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.0
  google_fonts: ^5.0.0

  # Video & Media
  image_picker: ^1.0.0
  video_player: ^2.7.0
  chewie: ^1.7.0
  flutter_cache_manager: ^3.3.0

  # HTTP & API
  dio: ^5.3.0
  http: ^1.1.0

  # State Management
  provider: ^6.0.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.0
  permission_handler: ^11.4.0
  uuid: ^4.0.0

  # Loading & Progress
  loading_indicator: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_linter: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
